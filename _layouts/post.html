  {% if page.image %}<img class="post-hero" src="{{ page.image | relative_url }}" alt="{{ page.title }}" width="1024" height="576">{% endif %}
  {{ content }}

    <p><strong>Tražiš domaći GTA 5 RP server?</strong> Probaj <a href="https://bmrp.rs">BMRP — Kriminalni Beograd</a>: mapa Beograda, 14+ frakcija, 453+ vozila. IP: <code>beograd.bmrp.rs:22005</code></p>
  </aside>
</article>
